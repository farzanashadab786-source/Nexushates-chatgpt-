<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Nexus AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

html,body{
height:100%;
}

.typing::after{
content:"▋";
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

pre{
background:#0f172a;
color:#e5e7eb;
padding:14px;
border-radius:10px;
overflow:auto;
}

code{
background:#1e293b;
padding:4px 6px;
border-radius:6px;
}

</style>

</head>

<body class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-gray-200">

<div id="loading"
class="fixed inset-0 flex items-center justify-center text-xl bg-white dark:bg-gray-950 z-50">
Loading Nexus...
</div>

<div id="app" class="hidden min-h-screen flex">

<div id="overlay"
class="fixed inset-0 bg-black/40 hidden z-30"></div>

<!-- SIDEBAR -->

<div id="sidebar"
class="fixed md:relative z-40 w-72 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 h-full transform -translate-x-full md:translate-x-0 transition-transform">

<div class="p-4 border-b dark:border-gray-800 flex justify-between">

<span class="font-bold text-lg">⚡ Nexus</span>

<button id="newChat"
class="text-blue-500">
New
</button>

</div>

<div id="chatList"
class="overflow-y-auto h-full pb-20"></div>

</div>

<!-- MAIN -->

<div class="flex flex-col flex-1 min-h-screen">

<!-- TOP BAR -->

<div
class="flex items-center justify-between p-3 border-b dark:border-gray-800 bg-white dark:bg-gray-900">

<div class="flex items-center gap-3">

<button id="menuBtn"
class="md:hidden text-xl">
☰
</button>

<h1 class="font-semibold">
Nexus
</h1>

</div>

<div class="flex gap-3">

<button id="darkToggle">
🌙
</button>

<button id="settingsBtn">
⚙
</button>

</div>

</div>

<!-- CHAT AREA -->

<div id="chatArea"
class="flex-1 overflow-y-auto px-4 pt-10 pb-28 space-y-6"></div>

<!-- INPUT -->

<div
class="fixed bottom-0 left-0 md:left-72 right-0 bg-white dark:bg-gray-900 border-t dark:border-gray-800 p-3">

<div class="max-w-3xl mx-auto flex gap-2">

<textarea
id="messageInput"
rows="1"
placeholder="Ask Nexus..."
class="flex-1 resize-none p-3 border rounded-lg dark:bg-gray-950"></textarea>

<button
id="sendBtn"
class="bg-blue-500 hover:bg-blue-600 text-white px-5 rounded-lg">
Send
</button>

</div>

</div>

</div>

</div>

<!-- SETTINGS -->

<div id="settingsModal"
class="fixed inset-0 hidden items-center justify-center bg-black/50">

<div
class="bg-white dark:bg-gray-900 p-6 rounded-xl w-96 space-y-4">

<h2 class="font-bold text-lg">
Settings
</h2>

<input
id="apiKeyInput"
type="password"
placeholder="OpenRouter API Key"
class="w-full p-2 border rounded dark:bg-gray-950">

<input
id="modelInput"
type="text"
class="w-full p-2 border rounded dark:bg-gray-950">

<textarea
id="systemPromptInput"
placeholder="System Prompt"
class="w-full p-2 border rounded dark:bg-gray-950"></textarea>

<div class="flex justify-end gap-2">

<button
id="saveSettings"
class="bg-blue-500 text-white px-3 py-1 rounded">
Save
</button>

<button
id="closeSettings"
class="border px-3 py-1 rounded">
Close
</button>

</div>

</div>

</div>

<script>

marked.setOptions({
breaks:true,
gfm:true
})

const loading=document.getElementById("loading")
const app=document.getElementById("app")
const chatArea=document.getElementById("chatArea")
const chatList=document.getElementById("chatList")
const input=document.getElementById("messageInput")

let chats=JSON.parse(localStorage.getItem("chats")||"[]")
let currentChatId=null

let apiKey=localStorage.getItem("apiKey")||""
let model=localStorage.getItem("model")||"deepseek/deepseek-r1:free"
let systemPrompt=localStorage.getItem("systemPrompt")||""

if(localStorage.getItem("dark")==="true"){
document.documentElement.classList.add("dark")
}

function save(){
localStorage.setItem("chats",JSON.stringify(chats))
}

function newChat(){

const id=Date.now()

const chat={
id,
title:"New Chat",
messages:[]
}

chats.unshift(chat)
currentChatId=id
save()

renderChats()
renderMessages()

}

function getChat(){
return chats.find(c=>c.id===currentChatId)
}

function renderChats(){

chatList.innerHTML=""

chats.forEach(chat=>{

const div=document.createElement("div")

div.className="p-3 border-b cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800"

div.innerHTML=`
<div class="flex justify-between">
<span>${chat.title}</span>
<button onclick="deleteChat(${chat.id})">🗑</button>
</div>
`

div.onclick=()=>{

currentChatId=chat.id
renderMessages()
closeSidebar()

}

chatList.appendChild(div)

})

}

function deleteChat(id){

chats=chats.filter(c=>c.id!==id)

save()
renderChats()
renderMessages()

}

function renderMessages(){

chatArea.innerHTML=""

const chat=getChat()
if(!chat)return

chat.messages.forEach(m=>{

addMessage(m.role,m.content,false)

})

scrollBottom()

}

function scrollBottom(){

chatArea.scrollTop=chatArea.scrollHeight

}

function addMessage(role,content,scroll=true){

const div=document.createElement("div")

div.className=`max-w-2xl p-4 rounded-xl shadow ${
role==="user"
?"ml-auto bg-blue-500 text-white"
:"bg-white dark:bg-gray-900 border dark:border-gray-800"
}`

div.innerHTML=marked.parse(content)

chatArea.appendChild(div)

addCopyButtons()

if(scroll){
scrollBottom()
}

return div

}

function addCopyButtons(){

document.querySelectorAll("pre").forEach(pre=>{

if(pre.querySelector("button"))return

const btn=document.createElement("button")

btn.textContent="copy"

btn.className="text-xs float-right mb-2 bg-gray-700 text-white px-2 rounded"

btn.onclick=()=>{
navigator.clipboard.writeText(pre.innerText)
}

pre.prepend(btn)

})

}

async function sendMessage(){

const text=input.value.trim()
if(!text)return

input.value=""

const chat=getChat()

chat.messages.push({role:"user",content:text})

addMessage("user",text)

const aiDiv=addMessage("assistant","",true)
aiDiv.classList.add("typing")

try{

const res=await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{
method:"POST",
headers:{
"Authorization":"Bearer "+apiKey,
"Content-Type":"application/json"
},
body:JSON.stringify({
model,
messages:[
{role:"system",content:systemPrompt},
...chat.messages
],
stream:true
})
})

const reader=res.body.getReader()
const decoder=new TextDecoder()

let aiText=""

while(true){

const {done,value}=await reader.read()
if(done)break

const chunk=decoder.decode(value)

const lines=chunk.split("\n")

for(const line of lines){

if(!line.startsWith("data:"))continue

const data=line.replace("data:","").trim()

if(data==="[DONE]")break

try{

const json=JSON.parse(data)

const token=json.choices?.[0]?.delta?.content

if(token){

aiText+=token
aiDiv.innerHTML=marked.parse(aiText)
scrollBottom()

}

}catch{}

}

}

aiDiv.classList.remove("typing")

chat.messages.push({role:"assistant",content:aiText})

save()

}catch(e){

aiDiv.innerHTML="Error: "+e.message

}

}

document.getElementById("sendBtn").onclick=sendMessage

input.addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault()
sendMessage()
}
})

const sidebar=document.getElementById("sidebar")
const overlay=document.getElementById("overlay")

function closeSidebar(){
sidebar.classList.add("-translate-x-full")
overlay.classList.add("hidden")
}

document.getElementById("menuBtn").onclick=()=>{
sidebar.classList.toggle("-translate-x-full")
overlay.classList.toggle("hidden")
}

overlay.onclick=closeSidebar

document.getElementById("darkToggle").onclick=()=>{
document.documentElement.classList.toggle("dark")
localStorage.setItem(
"dark",
document.documentElement.classList.contains("dark")
)
}

document.getElementById("settingsBtn").onclick=()=>{
const m=document.getElementById("settingsModal")
m.classList.remove("hidden")
m.classList.add("flex")

document.getElementById("apiKeyInput").value=apiKey
document.getElementById("modelInput").value=model
document.getElementById("systemPromptInput").value=systemPrompt
}

document.getElementById("closeSettings").onclick=()=>{
document.getElementById("settingsModal").classList.add("hidden")
}

document.getElementById("saveSettings").onclick=()=>{
apiKey=document.getElementById("apiKeyInput").value
model=document.getElementById("modelInput").value
systemPrompt=document.getElementById("systemPromptInput").value

localStorage.setItem("apiKey",apiKey)
localStorage.setItem("model",model)
localStorage.setItem("systemPrompt",systemPrompt)

document.getElementById("settingsModal").classList.add("hidden")
}

document.getElementById("newChat").onclick=newChat

if(chats.length===0){
newChat()
}else{
currentChatId=chats[0].id
}

renderChats()
renderMessages()

loading.style.display="none"
app.classList.remove("hidden")

</script>

</body>
  </html>
